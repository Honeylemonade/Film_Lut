<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUT 批量套用工具 (Web)</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(circle at 20% 0%, #eef2ff 0%, #f6f7fb 45%, #eef7ff 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 28px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.05);
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .stack { display: grid; gap: 10px; }
    input[type="file"], input[type="text"], input[type="number"], button {
      font-size: 14px;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      outline: none;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 600;
    }
    button.secondary {
      background: #374151;
    }
    button.sm {
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .muted { color: var(--muted); font-size: 13px; }
    .full { width: 100%; }
    .log {
      width: 100%;
      min-height: 220px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
      overflow: auto;
    }
    .output {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #fafafa;
      font-size: 14px;
    }
    .preview-zone {
      margin-top: 8px;
      min-height: 220px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .preview-empty {
      color: var(--muted);
      font-size: 13px;
    }
    .preview-single {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #f8fafc, #edf2f7);
    }
    .preview-single img {
      max-width: 100%;
      max-height: 260px;
      object-fit: contain;
      display: block;
    }
    .preview-stack {
      width: 280px;
      height: 180px;
      position: relative;
    }
    .stack-card {
      position: absolute;
      width: 210px;
      height: 140px;
      border-radius: 10px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.18);
      background-size: cover;
      background-position: center;
      background-color: #dbeafe;
    }
    .stack-count {
      position: absolute;
      right: 10px;
      bottom: 10px;
      background: rgba(17, 24, 39, 0.85);
      color: #fff;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
    }
    .tool-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .lut-list {
      width: 100%;
      min-height: 260px;
      max-height: 400px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px;
      background: #fff;
      overflow: auto;
    }
    .lut-row {
      display: grid;
      grid-template-columns: 24px 24px 1fr;
      align-items: center;
      gap: 8px;
      border-radius: 8px;
      padding: 3px 6px;
      min-height: 30px;
    }
    .lut-row:hover {
      background: #f3f4f6;
    }
    .lut-row.is-selected {
      background: #e8f0ff;
    }
    .lut-check {
      width: 16px;
      height: 16px;
      cursor: pointer;
      margin: 0;
    }
    .lut-star {
      border: none;
      background: transparent;
      color: #94a3b8;
      padding: 0;
      font-size: 19px;
      line-height: 1;
      cursor: pointer;
    }
    .lut-star.is-fav {
      color: #f59e0b;
    }
    .lut-name {
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .compare-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fafc;
      min-height: 420px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .compare-panel img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #0f172a;
    }
    .compare-tag {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(15, 23, 42, 0.78);
      color: #fff;
      font-size: 12px;
      line-height: 1;
      padding: 6px 8px;
      border-radius: 999px;
      z-index: 2;
    }
    .lut-row.is-active-preview {
      outline: 1px solid #60a5fa;
      background: #dbeafe;
    }
    .progress-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #e5e7eb;
      height: 14px;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2563eb, #0ea5e9);
      transition: width .2s ease;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .compare-grid { grid-template-columns: 1fr; }
      .compare-panel { min-height: 320px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>LUT 批量套用工具 (Web 本地版)</h1>

    <div class="grid">
      <div class="card stack">
        <h2>1) 上传图片（支持批量）</h2>
        <input id="images" type="file" accept="image/*" multiple />
        <div id="imageInfo" class="muted">尚未选择图片</div>
        <div id="imagePreview" class="preview-zone"><div class="preview-empty">选择图片后会在这里预览</div></div>

        <h2>2) 导入自定义 LUT（.cube）</h2>
        <div class="row">
          <input id="lutFiles" type="file" accept=".cube" multiple class="full" />
          <button id="importBtn" class="secondary">导入 LUT</button>
        </div>
        <div id="importInfo" class="muted">导入后会自动刷新 LUT 列表</div>
      </div>

      <div class="card stack">
        <h2>3) 选择 LUT（可多选）</h2>
        <div class="tool-row">
          <button id="refreshBtn" class="secondary sm">刷新</button>
          <button id="selectAllBtn" class="secondary sm">全选</button>
          <button id="clearSelBtn" class="secondary sm">清空</button>
          <button id="deleteSelBtn" class="secondary sm">删除选中</button>
        </div>
        <div class="tool-row">
          <button id="pickFavBtn" class="secondary sm">选择收藏</button>
          <button id="favOnlyBtn" class="secondary sm">只看收藏: 关</button>
        </div>
        <div id="lutList" class="lut-list"></div>
        <div id="lutInfo" class="muted"></div>
      </div>
    </div>

    <div class="card stack" style="margin-top:16px;">
      <h2>即时前后对比（基于第一张图片）</h2>
      <div class="compare-grid">
        <div id="compareOriginal" class="compare-panel">
          <div class="compare-tag">原图</div>
          <div class="preview-empty">请先上传图片</div>
        </div>
        <div id="compareProcessed" class="compare-panel">
          <div class="compare-tag">套用后</div>
          <div class="preview-empty">点击左上 LUT 列表中的任意项即可预览</div>
        </div>
      </div>
    </div>

    <div class="card stack" style="margin-top:16px;">
      <h2>4) 导出设置</h2>
      <label>导出目录（本机路径，不填则自动生成）</label>
      <input id="outputDir" type="text" placeholder="例如: /Users/yourname/Desktop/exports" />

      <label>输出格式</label>
      <div class="muted">固定为无损 PNG（`compression_level=0`）</div>

      <label>胶片颗粒强度（0-100，0=关闭）</label>
      <div class="row">
        <input id="grain" type="range" min="0" max="100" value="50" style="flex:1;" />
        <input id="grainNum" type="number" min="0" max="100" value="50" style="width:90px;" />
      </div>

      <label>色散强度（0-100，0=关闭）</label>
      <div class="row">
        <input id="dispersion" type="range" min="0" max="100" value="50" style="flex:1;" />
        <input id="dispersionNum" type="number" min="0" max="100" value="50" style="width:90px;" />
      </div>

      <label>暗角强度（0-100，0=关闭）</label>
      <div class="row">
        <input id="vignette" type="range" min="0" max="100" value="30" style="flex:1;" />
        <input id="vignetteNum" type="number" min="0" max="100" value="30" style="width:90px;" />
      </div>

      <label>锐化强度（-100~100，负值降低，0=关闭）</label>
      <div class="row">
        <input id="sharpen" type="range" min="-100" max="100" value="0" style="flex:1;" />
        <input id="sharpenNum" type="number" min="-100" max="100" value="0" style="width:90px;" />
      </div>

      <label>清晰度强度（-100~100，负值降低，0=关闭）</label>
      <div class="row">
        <input id="clarity" type="range" min="-100" max="100" value="0" style="flex:1;" />
        <input id="clarityNum" type="number" min="-100" max="100" value="0" style="width:90px;" />
      </div>

      <div class="row">
        <button id="runBtn">5) 开始批量套 LUT</button>
      </div>
    </div>

    <div class="card stack" style="margin-top:16px;">
      <h2>处理结果</h2>
      <div class="progress-wrap"><div id="progressFill" class="progress-fill"></div></div>
      <div id="progressText" class="muted">进度: 0%</div>
      <div id="result" class="output">等待执行...</div>
      <div id="log" class="log"></div>
    </div>
  </div>

  <script>
    const imagesEl = document.getElementById('images');
    const imageInfoEl = document.getElementById('imageInfo');
    const imagePreviewEl = document.getElementById('imagePreview');
    const lutFilesEl = document.getElementById('lutFiles');
    const importBtn = document.getElementById('importBtn');
    const importInfoEl = document.getElementById('importInfo');
    const refreshBtn = document.getElementById('refreshBtn');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const clearSelBtn = document.getElementById('clearSelBtn');
    const deleteSelBtn = document.getElementById('deleteSelBtn');
    const pickFavBtn = document.getElementById('pickFavBtn');
    const favOnlyBtn = document.getElementById('favOnlyBtn');
    const lutListEl = document.getElementById('lutList');
    const lutInfoEl = document.getElementById('lutInfo');
    const compareOriginalEl = document.getElementById('compareOriginal');
    const compareProcessedEl = document.getElementById('compareProcessed');
    const outputDirEl = document.getElementById('outputDir');
    const grainEl = document.getElementById('grain');
    const grainNumEl = document.getElementById('grainNum');
    const dispersionEl = document.getElementById('dispersion');
    const dispersionNumEl = document.getElementById('dispersionNum');
    const vignetteEl = document.getElementById('vignette');
    const vignetteNumEl = document.getElementById('vignetteNum');
    const sharpenEl = document.getElementById('sharpen');
    const sharpenNumEl = document.getElementById('sharpenNum');
    const clarityEl = document.getElementById('clarity');
    const clarityNumEl = document.getElementById('clarityNum');
    const runBtn = document.getElementById('runBtn');
    const resultEl = document.getElementById('result');
    const logEl = document.getElementById('log');
    const progressFillEl = document.getElementById('progressFill');
    const progressTextEl = document.getElementById('progressText');
    let allLuts = [];
    let showFavoritesOnly = false;
    let imagePreviewUrls = [];
    const selectedLutIds = new Set();
    let activePreviewLutId = null;
    let previewReqToken = 0;
    let previewAbortController = null;

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent += `[${time}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setRunning(running) {
      runBtn.disabled = running;
      importBtn.disabled = running;
      refreshBtn.disabled = running;
      selectAllBtn.disabled = running;
      clearSelBtn.disabled = running;
      deleteSelBtn.disabled = running;
      pickFavBtn.disabled = running;
      favOnlyBtn.disabled = running;
    }

    function setProgress(percent, done, total) {
      const p = Math.max(0, Math.min(100, Number(percent) || 0));
      progressFillEl.style.width = `${p}%`;
      if (typeof done === 'number' && typeof total === 'number') {
        progressTextEl.textContent = `进度: ${p.toFixed(1)}% (${done}/${total})`;
      } else {
        progressTextEl.textContent = `进度: ${p.toFixed(1)}%`;
      }
    }

    function getSelectedLutIds() {
      const validIds = new Set(allLuts.map(item => item.id));
      return Array.from(selectedLutIds).filter(id => validIds.has(id));
    }

    function getVisibleLuts() {
      return showFavoritesOnly ? allLuts.filter(item => item.favorite) : allLuts;
    }

    function getCurrentAdjustments() {
      return {
        grainStrength: parseInt(grainNumEl.value || '50', 10),
        dispersionStrength: parseInt(dispersionNumEl.value || '50', 10),
        vignetteStrength: parseInt(vignetteNumEl.value || '30', 10),
        sharpenStrength: parseInt(sharpenNumEl.value || '0', 10),
        clarityStrength: parseInt(clarityNumEl.value || '0', 10),
      };
    }

    function setPreviewMessage(message) {
      compareProcessedEl.innerHTML = `<div class="compare-tag">套用后</div><div class="preview-empty">${message}</div>`;
    }

    function setOriginalPreview(url, hasImage) {
      if (!hasImage) {
        compareOriginalEl.innerHTML = '<div class="compare-tag">原图</div><div class="preview-empty">请先上传图片</div>';
        return;
      }
      compareOriginalEl.innerHTML = '<div class="compare-tag">原图</div>';
      const img = document.createElement('img');
      img.src = url;
      img.alt = '原图预览';
      compareOriginalEl.appendChild(img);
    }

    async function requestLutPreview(lutId) {
      activePreviewLutId = lutId;
      renderLutList();
      const files = Array.from(imagesEl.files || []);
      if (!files.length) {
        setPreviewMessage('请先上传图片（将使用第一张图片预览）');
        return;
      }

      if (previewAbortController) {
        previewAbortController.abort();
      }
      previewAbortController = new AbortController();
      const token = ++previewReqToken;
      setPreviewMessage('正在生成预览...');

      const adj = getCurrentAdjustments();
      const fd = new FormData();
      fd.append('image', files[0]);
      fd.append('lut_id', lutId);
      fd.append('grain_strength', String(adj.grainStrength));
      fd.append('dispersion_strength', String(adj.dispersionStrength));
      fd.append('vignette_strength', String(adj.vignetteStrength));
      fd.append('sharpen_strength', String(adj.sharpenStrength));
      fd.append('clarity_strength', String(adj.clarityStrength));

      try {
        const res = await fetch('/api/preview', {
          method: 'POST',
          body: fd,
          signal: previewAbortController.signal,
        });
        const data = await res.json();
        if (token !== previewReqToken) {
          return;
        }
        if (!res.ok) {
          throw new Error(data.error || '预览失败');
        }
        const img = document.createElement('img');
        img.src = data.image_data_url;
        img.alt = 'LUT 预览';
        compareProcessedEl.innerHTML = '<div class="compare-tag">套用后</div>';
        compareProcessedEl.appendChild(img);
      } catch (e) {
        if (e.name === 'AbortError') {
          return;
        }
        if (token !== previewReqToken) {
          return;
        }
        setPreviewMessage(`预览失败: ${e.message}`);
      }
    }

    function refreshActivePreview() {
      if (activePreviewLutId) {
        requestLutPreview(activePreviewLutId);
      }
    }

    function toggleSelectLut(lutId, selected) {
      if (selected) {
        selectedLutIds.add(lutId);
      } else {
        selectedLutIds.delete(lutId);
      }
    }

    function clearPreviewUrls() {
      imagePreviewUrls.forEach(url => URL.revokeObjectURL(url));
      imagePreviewUrls = [];
    }

    function renderImagePreview(files) {
      clearPreviewUrls();
      imagePreviewEl.innerHTML = '';
      if (!files.length) {
        imagePreviewEl.innerHTML = '<div class="preview-empty">选择图片后会在这里预览</div>';
        setOriginalPreview('', false);
        return;
      }

      const urls = files.map(file => URL.createObjectURL(file));
      imagePreviewUrls = urls;

      if (files.length === 1) {
        const wrap = document.createElement('div');
        wrap.className = 'preview-single';
        const img = document.createElement('img');
        img.src = urls[0];
        img.alt = files[0].name;
        wrap.appendChild(img);
        imagePreviewEl.appendChild(wrap);
        setOriginalPreview(urls[0], true);
        return;
      }

      const stack = document.createElement('div');
      stack.className = 'preview-stack';
      const limit = Math.min(4, urls.length);
      for (let i = 0; i < limit; i += 1) {
        const card = document.createElement('div');
        card.className = 'stack-card';
        card.style.backgroundImage = `url("${urls[i]}")`;
        card.style.left = `${18 + i * 16}px`;
        card.style.top = `${18 + i * 8}px`;
        card.style.transform = `rotate(${(i - 1.5) * 3}deg)`;
        card.style.zIndex = String(i + 1);
        stack.appendChild(card);
      }
      const count = document.createElement('div');
      count.className = 'stack-count';
      count.textContent = `${files.length} 张`;
      stack.appendChild(count);
      imagePreviewEl.appendChild(stack);
      setOriginalPreview(urls[0], true);
    }

    function renderLutList() {
      const visibleLuts = getVisibleLuts();
      const sortedLuts = [...visibleLuts].sort((a, b) => {
        if (a.favorite !== b.favorite) {
          return a.favorite ? -1 : 1;
        }
        return a.label.localeCompare(b.label, 'zh-CN');
      });

      lutListEl.innerHTML = '';
      sortedLuts.forEach(item => {
        const row = document.createElement('div');
        row.className = `lut-row${selectedLutIds.has(item.id) ? ' is-selected' : ''}${activePreviewLutId === item.id ? ' is-active-preview' : ''}`;

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'lut-check';
        checkbox.checked = selectedLutIds.has(item.id);
        checkbox.addEventListener('click', (event) => {
          event.stopPropagation();
        });
        checkbox.addEventListener('change', () => {
          toggleSelectLut(item.id, checkbox.checked);
          row.classList.toggle('is-selected', checkbox.checked);
        });

        const starBtn = document.createElement('button');
        starBtn.type = 'button';
        starBtn.className = `lut-star${item.favorite ? ' is-fav' : ''}`;
        starBtn.textContent = item.favorite ? '★' : '☆';
        starBtn.title = item.favorite ? '取消收藏' : '收藏';
        starBtn.addEventListener('click', async (event) => {
          event.stopPropagation();
          try {
            const res = await fetch('/api/favorites/bulk', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ lut_ids: [item.id], favorite: !item.favorite }),
            });
            const data = await res.json();
            if (!res.ok) {
              throw new Error(data.error || '更新收藏失败');
            }
            await loadLuts();
          } catch (e) {
            log(`更新收藏失败: ${e.message}`);
            alert(`更新收藏失败: ${e.message}`);
          }
        });

        const label = document.createElement('div');
        label.className = 'lut-name';
        label.textContent = item.label;

        row.addEventListener('click', () => {
          requestLutPreview(item.id);
        });

        row.appendChild(checkbox);
        row.appendChild(starBtn);
        row.appendChild(label);
        lutListEl.appendChild(row);
      });

      const favCount = allLuts.filter(item => item.favorite).length;
      lutInfoEl.textContent = `当前 LUT 数量: ${allLuts.length}，收藏: ${favCount}${showFavoritesOnly ? '（仅显示收藏）' : ''}`;
      favOnlyBtn.textContent = `只看收藏: ${showFavoritesOnly ? '开' : '关'}`;
    }

    async function loadLuts() {
      const res = await fetch('/api/luts');
      const data = await res.json();
      allLuts = data.luts || [];
      const validIds = new Set(allLuts.map(item => item.id));
      for (const id of Array.from(selectedLutIds)) {
        if (!validIds.has(id)) {
          selectedLutIds.delete(id);
        }
      }
      renderLutList();
      log(`LUT 列表已刷新，共 ${allLuts.length} 个，收藏 ${allLuts.filter(item => item.favorite).length} 个`);
    }

    imagesEl.addEventListener('change', () => {
      const files = Array.from(imagesEl.files || []);
      imageInfoEl.textContent = files.length ? `已选择 ${files.length} 张图片` : '尚未选择图片';
      renderImagePreview(files);
      if (!files.length) {
        activePreviewLutId = null;
        setPreviewMessage('点击 LUT 后在这里显示预览');
      } else {
        refreshActivePreview();
      }
    });

    grainEl.addEventListener('input', () => {
      grainNumEl.value = grainEl.value;
    });
    grainEl.addEventListener('change', refreshActivePreview);
    grainNumEl.addEventListener('input', () => {
      let v = parseInt(grainNumEl.value || '50', 10);
      if (Number.isNaN(v)) v = 50;
      v = Math.max(0, Math.min(100, v));
      grainNumEl.value = String(v);
      grainEl.value = String(v);
    });
    grainNumEl.addEventListener('change', refreshActivePreview);
    dispersionEl.addEventListener('input', () => {
      dispersionNumEl.value = dispersionEl.value;
    });
    dispersionEl.addEventListener('change', refreshActivePreview);
    dispersionNumEl.addEventListener('input', () => {
      let v = parseInt(dispersionNumEl.value || '50', 10);
      if (Number.isNaN(v)) v = 50;
      v = Math.max(0, Math.min(100, v));
      dispersionNumEl.value = String(v);
      dispersionEl.value = String(v);
    });
    dispersionNumEl.addEventListener('change', refreshActivePreview);
    vignetteEl.addEventListener('input', () => {
      vignetteNumEl.value = vignetteEl.value;
    });
    vignetteEl.addEventListener('change', refreshActivePreview);
    vignetteNumEl.addEventListener('input', () => {
      let v = parseInt(vignetteNumEl.value || '30', 10);
      if (Number.isNaN(v)) v = 30;
      v = Math.max(0, Math.min(100, v));
      vignetteNumEl.value = String(v);
      vignetteEl.value = String(v);
    });
    vignetteNumEl.addEventListener('change', refreshActivePreview);
    sharpenEl.addEventListener('input', () => {
      sharpenNumEl.value = sharpenEl.value;
    });
    sharpenEl.addEventListener('change', refreshActivePreview);
    sharpenNumEl.addEventListener('input', () => {
      let v = parseInt(sharpenNumEl.value || '0', 10);
      if (Number.isNaN(v)) v = 0;
      v = Math.max(-100, Math.min(100, v));
      sharpenNumEl.value = String(v);
      sharpenEl.value = String(v);
    });
    sharpenNumEl.addEventListener('change', refreshActivePreview);
    clarityEl.addEventListener('input', () => {
      clarityNumEl.value = clarityEl.value;
    });
    clarityEl.addEventListener('change', refreshActivePreview);
    clarityNumEl.addEventListener('input', () => {
      let v = parseInt(clarityNumEl.value || '0', 10);
      if (Number.isNaN(v)) v = 0;
      v = Math.max(-100, Math.min(100, v));
      clarityNumEl.value = String(v);
      clarityEl.value = String(v);
    });
    clarityNumEl.addEventListener('change', refreshActivePreview);

    refreshBtn.addEventListener('click', loadLuts);

    selectAllBtn.addEventListener('click', () => {
      getVisibleLuts().forEach(item => selectedLutIds.add(item.id));
      renderLutList();
      log(`已全选 ${getVisibleLuts().length} 个 LUT`);
    });

    clearSelBtn.addEventListener('click', () => {
      selectedLutIds.clear();
      renderLutList();
      log('已清空 LUT 选择');
    });

    deleteSelBtn.addEventListener('click', async () => {
      const selectedIds = getSelectedLutIds();
      if (!selectedIds.length) {
        alert('请先选择要删除的 LUT');
        return;
      }
      if (!confirm(`确认删除选中的 ${selectedIds.length} 个 LUT 吗？`)) {
        return;
      }

      try {
        const res = await fetch('/api/luts/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lut_ids: selectedIds }),
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || '删除失败');
        }
        await loadLuts();
        log(`删除 LUT: 成功 ${data.deleted_count}，跳过 ${data.skipped_invalid.length}`);
      } catch (e) {
        log(`删除 LUT 失败: ${e.message}`);
        alert(`删除 LUT 失败: ${e.message}`);
      }
    });

    pickFavBtn.addEventListener('click', () => {
      selectedLutIds.clear();
      allLuts.filter(item => item.favorite).forEach(item => selectedLutIds.add(item.id));
      renderLutList();
      const favoriteIds = allLuts.filter(item => item.favorite);
      log(`已选择收藏 LUT，共 ${favoriteIds.length} 个`);
    });

    favOnlyBtn.addEventListener('click', () => {
      showFavoritesOnly = !showFavoritesOnly;
      renderLutList();
    });

    importBtn.addEventListener('click', async () => {
      const files = Array.from(lutFilesEl.files || []);
      if (!files.length) {
        alert('请先选择 .cube 文件');
        return;
      }

      const fd = new FormData();
      files.forEach(f => fd.append('lut_files', f));

      importBtn.disabled = true;
      try {
        const res = await fetch('/api/import-luts', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || '导入失败');
        }
        importInfoEl.textContent = `已导入 ${data.count} 个 LUT`;
        log(`导入 LUT 完成: ${data.count} 个`);
        await loadLuts();
      } catch (e) {
        log(`导入失败: ${e.message}`);
        alert(`导入失败: ${e.message}`);
      } finally {
        importBtn.disabled = false;
      }
    });

    runBtn.addEventListener('click', async () => {
      const images = Array.from(imagesEl.files || []);
      const selectedLuts = getSelectedLutIds();

      if (!images.length) {
        alert('请至少上传 1 张图片');
        return;
      }
      if (!selectedLuts.length) {
        alert('请至少选择 1 个 LUT');
        return;
      }

      const grainStrength = parseInt(grainNumEl.value || '50', 10);
      const dispersionStrength = parseInt(dispersionNumEl.value || '50', 10);
      const vignetteStrength = parseInt(vignetteNumEl.value || '30', 10);
      const sharpenStrength = parseInt(sharpenNumEl.value || '0', 10);
      const clarityStrength = parseInt(clarityNumEl.value || '0', 10);
      const outputDir = (outputDirEl.value || '').trim();

      const fd = new FormData();
      images.forEach(f => fd.append('images', f));
      fd.append('selected_luts', JSON.stringify(selectedLuts));
      fd.append('grain_strength', String(grainStrength));
      fd.append('dispersion_strength', String(dispersionStrength));
      fd.append('vignette_strength', String(vignetteStrength));
      fd.append('sharpen_strength', String(sharpenStrength));
      fd.append('clarity_strength', String(clarityStrength));
      fd.append('output_dir', outputDir);

      setRunning(true);
      setProgress(0, 0, images.length * selectedLuts.length);
      resultEl.textContent = '处理中，请稍候...';
      log(
        `开始处理: 图片 ${images.length} 张 x LUT ${selectedLuts.length} 个, 输出无损 PNG, 颗粒 ${grainStrength}, 色散 ${dispersionStrength}, 暗角 ${vignetteStrength}, 锐化 ${sharpenStrength}, 清晰度 ${clarityStrength}`
      );

      try {
        const startRes = await fetch('/api/process/start', { method: 'POST', body: fd });
        const startData = await startRes.json();
        if (!startRes.ok) {
          throw new Error(startData.error || '启动处理失败');
        }
        const jobId = startData.job_id;
        log(`任务已创建: ${jobId}`);

        while (true) {
          const statusRes = await fetch(`/api/process/status/${jobId}`);
          const status = await statusRes.json();
          if (!statusRes.ok) {
            throw new Error(status.error || '获取进度失败');
          }

          setProgress(status.progress, status.done, status.total);

          if (status.status === 'done') {
            const data = status.result || {};
            resultEl.innerHTML = `
              <div>总任务: <b>${data.total}</b></div>
              <div>成功: <b>${data.success}</b>，失败: <b>${data.failed}</b></div>
              <div>导出目录: <b>${data.output_dir}</b></div>
              <div>输出格式: <b>${(data.output_format || 'png').toUpperCase()}</b>（无损）</div>
              <div>颗粒: <b>${data.grain_strength}</b>（ffmpeg noise=${data.ffmpeg_noise_strength}）</div>
              <div>色散: <b>${data.dispersion_strength}</b>（ffmpeg chromashift=${data.ffmpeg_chromashift_px}px）</div>
              <div>暗角: <b>${data.vignette_strength}</b>（ffmpeg vignette angle=${data.ffmpeg_vignette_angle}）</div>
              <div>锐化: <b>${data.sharpen_strength}</b>（ffmpeg unsharp=${data.ffmpeg_unsharp_amount}）</div>
              <div>清晰度: <b>${data.clarity_strength}</b>（ffmpeg eq contrast=${data.ffmpeg_clarity_contrast}）</div>
            `;
            log(`处理完成: 成功 ${data.success}，失败 ${data.failed}`);
            if (data.output_dir) {
              try {
                const openRes = await fetch('/api/open-output', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ path: data.output_dir }),
                });
                const openData = await openRes.json();
                if (!openRes.ok) {
                  log(`自动打开导出目录失败: ${openData.error || '未知错误'}`);
                } else {
                  log(`已打开导出目录: ${data.output_dir}`);
                }
              } catch (openErr) {
                log(`自动打开导出目录失败: ${openErr.message}`);
              }
            }
            if (data.log_tail && data.log_tail.length) {
              data.log_tail.forEach(item => log(item));
            }
            break;
          }

          if (status.status === 'error') {
            throw new Error(status.error || '处理失败');
          }

          await new Promise(resolve => setTimeout(resolve, 400));
        }
      } catch (e) {
        resultEl.textContent = `处理失败: ${e.message}`;
        log(`处理失败: ${e.message}`);
        alert(`处理失败: ${e.message}`);
      } finally {
        setRunning(false);
      }
    });

    loadLuts().catch(err => {
      log(`初始化 LUT 失败: ${err.message}`);
    });
  </script>
</body>
</html>
