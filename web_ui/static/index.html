<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUT 批量套用工具（网页）</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(circle at 20% 0%, #eef2ff 0%, #f6f7fb 45%, #eef7ff 100%);
      color: var(--text);
    }
    .wrap {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 20px 24px 28px;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 28px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.05);
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .stack { display: grid; gap: 10px; }
    input[type="file"], input[type="text"], input[type="number"], select, button {
      font-size: 14px;
    }
    input[type="text"], input[type="number"], select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      outline: none;
      background: #fff;
    }
    input[type="text"]:focus, input[type="number"]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 600;
    }
    button.secondary {
      background: #374151;
    }
    button.sm {
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .muted { color: var(--muted); font-size: 13px; }
    .full { width: 100%; }
    .log {
      width: 100%;
      min-height: 220px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
      overflow: auto;
    }
    .output {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #fafafa;
      font-size: 14px;
    }
    .preview-zone {
      margin-top: 8px;
      min-height: 220px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .preview-zone.has-gallery {
      display: block;
      overflow: auto;
      max-height: 420px;
    }
    .gallery-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      padding: 10px;
    }
    .gallery-item {
      position: relative;
      border: 2px solid transparent;
      border-radius: 10px;
      overflow: hidden;
      background: #e5e7eb;
      cursor: pointer;
      height: 150px;
    }
    .gallery-item:hover {
      border-color: #93c5fd;
    }
    .gallery-item.is-active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.16);
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .gallery-check-wrap {
      position: absolute;
      top: 6px;
      left: 6px;
      z-index: 2;
      background: rgba(15, 23, 42, 0.72);
      border-radius: 999px;
      padding: 3px 7px;
      color: #fff;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .gallery-check {
      width: 14px;
      height: 14px;
      margin: 0;
      cursor: pointer;
    }
    .gallery-index {
      position: absolute;
      right: 6px;
      bottom: 6px;
      z-index: 2;
      background: rgba(15, 23, 42, 0.72);
      color: #fff;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
    }
    .preview-empty {
      color: var(--muted);
      font-size: 13px;
    }
    .preview-single {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #f8fafc, #edf2f7);
    }
    .preview-single img {
      max-width: 100%;
      max-height: 260px;
      object-fit: contain;
      display: block;
    }
    .preview-stack {
      width: 280px;
      height: 180px;
      position: relative;
    }
    .stack-card {
      position: absolute;
      width: 210px;
      height: 140px;
      border-radius: 10px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.18);
      background-size: cover;
      background-position: center;
      background-color: #dbeafe;
    }
    .stack-count {
      position: absolute;
      right: 10px;
      bottom: 10px;
      background: rgba(17, 24, 39, 0.85);
      color: #fff;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
    }
    .tool-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .lut-list {
      width: 100%;
      min-height: 0;
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px;
      background: #fff;
      overflow: auto;
    }
    .lut-row {
      display: grid;
      grid-template-columns: 24px 24px 1fr;
      align-items: center;
      gap: 8px;
      border-radius: 8px;
      padding: 3px 6px;
      min-height: 30px;
    }
    .lut-row:hover {
      background: #f3f4f6;
    }
    .lut-row.is-selected {
      background: #e8f0ff;
    }
    .lut-check {
      width: 16px;
      height: 16px;
      cursor: pointer;
      margin: 0;
    }
    .lut-star {
      border: none;
      background: transparent;
      color: #94a3b8;
      padding: 0;
      font-size: 19px;
      line-height: 1;
      cursor: pointer;
    }
    .lut-star.is-fav {
      color: #f59e0b;
    }
    .lut-name {
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .compare-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fafc;
      min-height: 420px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .compare-panel img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #0f172a;
    }
    .compare-tag {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(15, 23, 42, 0.78);
      color: #fff;
      font-size: 12px;
      line-height: 1;
      padding: 6px 8px;
      border-radius: 999px;
      z-index: 2;
    }
    .lut-row.is-active-preview {
      outline: 1px solid #60a5fa;
      background: #dbeafe;
    }
    .preview-lut-layout {
      display: grid;
      grid-template-columns: 74% 10px 26%;
      gap: 0;
      align-items: start;
    }
    .preview-side-stack {
      display: grid;
      grid-template-rows: minmax(300px, 1.2fr) minmax(320px, 1fr);
      gap: 16px;
      min-height: 0;
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 32px);
    }
    .preview-side-card {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }
    .settings-scroll {
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
      display: grid;
      gap: 10px;
    }
    .setting-label {
      font-size: 14px;
      font-weight: 600;
    }
    .setting-hint {
      margin-top: -4px;
    }
    .primary-action-row {
      position: sticky;
      bottom: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.8), #ffffff 18px);
      padding-top: 10px;
    }
    .split-divider {
      cursor: col-resize;
      display: flex;
      align-items: stretch;
      justify-content: center;
      user-select: none;
      touch-action: none;
    }
    .split-divider-bar {
      width: 2px;
      background: #cbd5e1;
      border-radius: 999px;
      margin: 8px 0;
    }
    .split-divider:hover .split-divider-bar {
      background: #94a3b8;
    }
    .progress-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #e5e7eb;
      height: 14px;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2563eb, #0ea5e9);
      transition: width .2s ease;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .preview-lut-layout { grid-template-columns: 1fr; }
      .preview-side-stack {
        position: static;
        max-height: none;
        grid-template-rows: auto;
      }
      .preview-side-card {
        overflow: visible;
      }
      .settings-scroll {
        overflow: visible;
        padding-right: 0;
      }
      .primary-action-row {
        position: static;
        background: transparent;
        padding-top: 0;
      }
      .split-divider { display: none; }
      .compare-grid { grid-template-columns: 1fr; }
      .compare-panel { min-height: 320px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>LUT 批量套用工具（本地网页）</h1>

    <div class="card stack">
      <h2>1) 上传图片（支持批量）</h2>
      <input id="images" type="file" accept="image/*" multiple />
      <div class="tool-row" style="margin-top:8px;">
        <button id="deleteImagesBtn" class="secondary sm">删除选中图片</button>
      </div>
      <div id="imageInfo" class="muted">未选择图片</div>
      <div id="imagePreview" class="preview-zone"><div class="preview-empty">选择图片后会在这里预览</div></div>

      <h2>2) 导入自定义 LUT（.cube）</h2>
      <div class="row">
        <input id="lutFiles" type="file" accept=".cube" multiple class="full" />
        <button id="importBtn" class="secondary">导入 LUT</button>
      </div>
      <div id="importInfo" class="muted">导入后自动刷新 LUT 列表</div>
    </div>

    <div id="previewLutLayout" class="preview-lut-layout" style="margin-top:16px;">
      <div class="card stack">
        <h2>实时前后对比预览（基于当前选中图片）</h2>
        <div class="compare-grid">
          <div id="compareOriginal" class="compare-panel">
            <div class="compare-tag">原图</div>
            <div class="preview-empty">请先上传图片</div>
          </div>
          <div id="compareProcessed" class="compare-panel">
            <div class="compare-tag">套用后</div>
            <div class="preview-empty">点击右侧 LUT 即可预览</div>
          </div>
        </div>
      </div>

      <div id="previewLutDivider" class="split-divider" aria-label="resize preview and lut panels">
        <div class="split-divider-bar"></div>
      </div>

      <div class="preview-side-stack">
        <div class="card preview-side-card">
          <h2>3) 选择 LUT（可多选）</h2>
          <div class="tool-row">
            <button id="refreshBtn" class="secondary sm">刷新</button>
            <button id="selectAllBtn" class="secondary sm">全选</button>
            <button id="clearSelBtn" class="secondary sm">清空</button>
            <button id="deleteSelBtn" class="secondary sm">删除选中</button>
          </div>
          <div class="tool-row">
            <button id="pickFavBtn" class="secondary sm">选择收藏</button>
            <button id="favOnlyBtn" class="secondary sm">只看收藏：关</button>
          </div>
          <div id="lutList" class="lut-list"></div>
          <div id="lutInfo" class="muted"></div>
        </div>

        <div class="card preview-side-card">
          <h2>4) 导出设置</h2>
          <div class="settings-scroll">
            <label class="setting-label">导出目录（本机路径，不填则自动生成）</label>
            <input id="outputDir" type="text" placeholder="例如：C:/Users/yourname/Desktop/exports" />

            <label class="setting-label">输出格式</label>
            <div class="muted setting-hint">固定为高画质 JPG（体积更小，画质更好）</div>
            <div class="muted setting-hint">当前默认值偏保守，目标是先压掉数码味，再留出二次微调空间。</div>

            <label class="setting-label">预览 / 导出最长边</label>
            <select id="maxDim">
              <option value="720">720 px</option>
              <option value="1440" selected>1440 px</option>
              <option value="3840">4K px</option>
            </select>

            <label class="setting-label">胶片颗粒强度（0-100，0 为关闭）</label>
            <div class="row">
              <input id="grain" type="range" min="0" max="100" value="38" style="flex:1;" />
              <input id="grainNum" type="number" min="0" max="100" value="38" style="width:90px;" />
            </div>

            <label class="setting-label">色散强度（0-100，0 为关闭）</label>
            <div class="row">
              <input id="dispersion" type="range" min="0" max="100" value="8" style="flex:1;" />
              <input id="dispersionNum" type="number" min="0" max="100" value="8" style="width:90px;" />
            </div>

            <label class="setting-label">暗角强度（0-100，0 为关闭）</label>
            <div class="row">
              <input id="vignette" type="range" min="0" max="100" value="18" style="flex:1;" />
              <input id="vignetteNum" type="number" min="0" max="100" value="18" style="width:90px;" />
            </div>

            <label class="setting-label">高光滚降（0-100，压柔亮部）</label>
            <div class="row">
              <input id="highlightRolloff" type="range" min="0" max="100" value="35" style="flex:1;" />
              <input id="highlightRolloffNum" type="number" min="0" max="100" value="35" style="width:90px;" />
            </div>

            <label class="setting-label">Halation 晕光（0-100，偏暖高光边缘）</label>
            <div class="row">
              <input id="halation" type="range" min="0" max="100" value="22" style="flex:1;" />
              <input id="halationNum" type="number" min="0" max="100" value="22" style="width:90px;" />
            </div>

            <label class="setting-label">Bloom 柔光扩散（0-100）</label>
            <div class="row">
              <input id="bloom" type="range" min="0" max="100" value="18" style="flex:1;" />
              <input id="bloomNum" type="number" min="0" max="100" value="18" style="width:90px;" />
            </div>

            <label class="setting-label">阴影抬升（0-100，模拟胶片黑位）</label>
            <div class="row">
              <input id="shadowLift" type="range" min="0" max="100" value="16" style="flex:1;" />
              <input id="shadowLiftNum" type="number" min="0" max="100" value="16" style="width:90px;" />
            </div>

            <label class="setting-label">阴影脚部 Toe（0-100，更圆润的黑位过渡）</label>
            <div class="row">
              <input id="toe" type="range" min="0" max="100" value="28" style="flex:1;" />
              <input id="toeNum" type="number" min="0" max="100" value="28" style="width:90px;" />
            </div>

            <label class="setting-label">高光肩部 Shoulder（0-100，更柔的亮部收束）</label>
            <div class="row">
              <input id="shoulder" type="range" min="0" max="100" value="42" style="flex:1;" />
              <input id="shoulderNum" type="number" min="0" max="100" value="42" style="width:90px;" />
            </div>

            <label class="setting-label">高光饱和度（-100 到 100）</label>
            <div class="row">
              <input id="highlightSaturation" type="range" min="-100" max="100" value="-18" style="flex:1;" />
              <input id="highlightSaturationNum" type="number" min="-100" max="100" value="-18" style="width:90px;" />
            </div>

            <label class="setting-label">阴影饱和度（-100 到 100）</label>
            <div class="row">
              <input id="shadowSaturation" type="range" min="-100" max="100" value="-10" style="flex:1;" />
              <input id="shadowSaturationNum" type="number" min="-100" max="100" value="-10" style="width:90px;" />
            </div>

            <label class="setting-label">高光暖调（-100 到 100，正值更暖）</label>
            <div class="row">
              <input id="highlightWarmth" type="range" min="-100" max="100" value="8" style="flex:1;" />
              <input id="highlightWarmthNum" type="number" min="-100" max="100" value="8" style="width:90px;" />
            </div>

            <label class="setting-label">阴影冷调（-100 到 100，正值更冷）</label>
            <div class="row">
              <input id="shadowCoolness" type="range" min="-100" max="100" value="6" style="flex:1;" />
              <input id="shadowCoolnessNum" type="number" min="-100" max="100" value="6" style="width:90px;" />
            </div>

            <label class="setting-label">锐化强度（-100 到 100，0 为关闭）</label>
            <div class="row">
              <input id="sharpen" type="range" min="-100" max="100" value="-10" style="flex:1;" />
              <input id="sharpenNum" type="number" min="-100" max="100" value="-10" style="width:90px;" />
            </div>

            <label class="setting-label">清晰度强度（-100 到 100，0 为关闭）</label>
            <div class="row">
              <input id="clarity" type="range" min="-100" max="100" value="-8" style="flex:1;" />
              <input id="clarityNum" type="number" min="-100" max="100" value="-8" style="width:90px;" />
            </div>
          </div>

          <div class="row primary-action-row">
            <button id="runBtn">5) 开始批量套 LUT</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card stack" style="margin-top:16px;">
      <h2>处理结果</h2>
      <div class="progress-wrap"><div id="progressFill" class="progress-fill"></div></div>
      <div id="progressText" class="muted">进度：0%</div>
      <div id="result" class="output">等待执行...</div>
      <div id="log" class="log"></div>
    </div>
  </div>

  <script>
    const imagesEl = document.getElementById('images');
    const deleteImagesBtn = document.getElementById('deleteImagesBtn');
    const imageInfoEl = document.getElementById('imageInfo');
    const imagePreviewEl = document.getElementById('imagePreview');
    const lutFilesEl = document.getElementById('lutFiles');
    const importBtn = document.getElementById('importBtn');
    const importInfoEl = document.getElementById('importInfo');
    const refreshBtn = document.getElementById('refreshBtn');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const clearSelBtn = document.getElementById('clearSelBtn');
    const deleteSelBtn = document.getElementById('deleteSelBtn');
    const pickFavBtn = document.getElementById('pickFavBtn');
    const favOnlyBtn = document.getElementById('favOnlyBtn');
    const lutListEl = document.getElementById('lutList');
    const lutInfoEl = document.getElementById('lutInfo');
    const compareOriginalEl = document.getElementById('compareOriginal');
    const compareProcessedEl = document.getElementById('compareProcessed');
    const outputDirEl = document.getElementById('outputDir');
    const maxDimEl = document.getElementById('maxDim');
    const grainEl = document.getElementById('grain');
    const grainNumEl = document.getElementById('grainNum');
    const dispersionEl = document.getElementById('dispersion');
    const dispersionNumEl = document.getElementById('dispersionNum');
    const vignetteEl = document.getElementById('vignette');
    const vignetteNumEl = document.getElementById('vignetteNum');
    const highlightRolloffEl = document.getElementById('highlightRolloff');
    const highlightRolloffNumEl = document.getElementById('highlightRolloffNum');
    const halationEl = document.getElementById('halation');
    const halationNumEl = document.getElementById('halationNum');
    const bloomEl = document.getElementById('bloom');
    const bloomNumEl = document.getElementById('bloomNum');
    const shadowLiftEl = document.getElementById('shadowLift');
    const shadowLiftNumEl = document.getElementById('shadowLiftNum');
    const toeEl = document.getElementById('toe');
    const toeNumEl = document.getElementById('toeNum');
    const shoulderEl = document.getElementById('shoulder');
    const shoulderNumEl = document.getElementById('shoulderNum');
    const highlightSaturationEl = document.getElementById('highlightSaturation');
    const highlightSaturationNumEl = document.getElementById('highlightSaturationNum');
    const shadowSaturationEl = document.getElementById('shadowSaturation');
    const shadowSaturationNumEl = document.getElementById('shadowSaturationNum');
    const highlightWarmthEl = document.getElementById('highlightWarmth');
    const highlightWarmthNumEl = document.getElementById('highlightWarmthNum');
    const shadowCoolnessEl = document.getElementById('shadowCoolness');
    const shadowCoolnessNumEl = document.getElementById('shadowCoolnessNum');
    const sharpenEl = document.getElementById('sharpen');
    const sharpenNumEl = document.getElementById('sharpenNum');
    const clarityEl = document.getElementById('clarity');
    const clarityNumEl = document.getElementById('clarityNum');
    const runBtn = document.getElementById('runBtn');
    const resultEl = document.getElementById('result');
    const logEl = document.getElementById('log');
    const progressFillEl = document.getElementById('progressFill');
    const progressTextEl = document.getElementById('progressText');
    const previewLutLayoutEl = document.getElementById('previewLutLayout');
    const previewLutDividerEl = document.getElementById('previewLutDivider');
    let allLuts = [];
    let showFavoritesOnly = false;
    let selectedImageFiles = [];
    let activeImageIndex = 0;
    const selectedImageIndexes = new Set();
    let galleryItemNodes = [];
    let galleryCurrentUrls = [];
    let imagePreviewUrls = [];
    let previewImageBlob = null;
    let previewImageBlobMaxDim = null;
    const selectedLutIds = new Set();
    let activePreviewLutId = null;
    let previewReqToken = 0;
    let previewAbortController = null;

    function initPreviewLutResize() {
      if (!previewLutLayoutEl || !previewLutDividerEl) return;
      let dragging = false;

      const updateByClientX = (clientX) => {
        const rect = previewLutLayoutEl.getBoundingClientRect();
        if (rect.width <= 0) return;
        const rawPct = ((clientX - rect.left) / rect.width) * 100;
        const leftPct = Math.max(58, Math.min(88, rawPct));
        const rightPct = 100 - leftPct;
        previewLutLayoutEl.style.gridTemplateColumns = `${leftPct}% 10px ${rightPct}%`;
      };

      const onPointerMove = (e) => {
        if (!dragging) return;
        updateByClientX(e.clientX);
      };

      const onPointerUp = () => {
        dragging = false;
        window.removeEventListener('pointermove', onPointerMove);
        window.removeEventListener('pointerup', onPointerUp);
      };

      previewLutDividerEl.addEventListener('pointerdown', (e) => {
        if (window.matchMedia('(max-width: 900px)').matches) return;
        dragging = true;
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', onPointerUp);
        e.preventDefault();
      });
    }

    async function requestLutPreview(lutId) {
      activePreviewLutId = lutId;
      renderLutList();
      const files = getCurrentImages();
      if (!files.length) {
        setPreviewMessage('\u8bf7\u5148\u4e0a\u4f20\u56fe\u7247');
        return;
      }
      const activeFile = files[Math.min(activeImageIndex, files.length - 1)];

      const selectedMaxDim = parseInt(maxDimEl.value || '1440', 10);
      if (!previewImageBlob || previewImageBlobMaxDim !== selectedMaxDim) {
        setPreviewMessage('\u6b63\u5728\u51c6\u5907\u9884\u89c8...');
        previewImageBlob = await buildPreviewBlob(activeFile, selectedMaxDim);
        previewImageBlobMaxDim = selectedMaxDim;
      }

      if (previewAbortController) {
        previewAbortController.abort();
      }
      previewAbortController = new AbortController();
      const token = ++previewReqToken;
      setPreviewMessage('\u6b63\u5728\u751f\u6210\u9884\u89c8...');

      const adj = getCurrentAdjustments();
      const fd = new FormData();
      fd.append('image', previewImageBlob, 'preview.jpg');
      fd.append('lut_id', lutId);
      fd.append('max_dim', String(selectedMaxDim));
      fd.append('grain_strength', String(adj.grainStrength));
      fd.append('dispersion_strength', String(adj.dispersionStrength));
      fd.append('vignette_strength', String(adj.vignetteStrength));
      fd.append('highlight_rolloff_strength', String(adj.highlightRolloffStrength));
      fd.append('halation_strength', String(adj.halationStrength));
      fd.append('bloom_strength', String(adj.bloomStrength));
      fd.append('shadow_lift_strength', String(adj.shadowLiftStrength));
      fd.append('toe_strength', String(adj.toeStrength));
      fd.append('shoulder_strength', String(adj.shoulderStrength));
      fd.append('highlight_saturation', String(adj.highlightSaturation));
      fd.append('shadow_saturation', String(adj.shadowSaturation));
      fd.append('highlight_warmth', String(adj.highlightWarmth));
      fd.append('shadow_coolness', String(adj.shadowCoolness));
      fd.append('sharpen_strength', String(adj.sharpenStrength));
      fd.append('clarity_strength', String(adj.clarityStrength));

      try {
        const res = await fetch('/api/preview', {
          method: 'POST',
          body: fd,
          signal: previewAbortController.signal,
        });
        const data = await res.json();
        if (token !== previewReqToken) {
          return;
        }
        if (!res.ok) {
          throw new Error(data.error || '\u9884\u89c8\u5931\u8d25');
        }
        const img = document.createElement('img');
        img.src = data.image_data_url;
        img.alt = 'LUT \u9884\u89c8';
        compareProcessedEl.innerHTML = '<div class="compare-tag">\u5957\u7528\u540e</div>';
        compareProcessedEl.appendChild(img);
      } catch (e) {
        if (e.name === 'AbortError') {
          return;
        }
        if (token !== previewReqToken) {
          return;
        }
        setPreviewMessage(`\u9884\u89c8\u5931\u8d25\uff1a${e.message}`);
      }
    }

    async function buildPreviewBlob(file, maxDim) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error('\u8bfb\u53d6\u56fe\u7247\u5931\u8d25'));
        reader.onload = () => {
          const img = new Image();
          img.onerror = () => reject(new Error('\u89e3\u7801\u56fe\u7247\u5931\u8d25'));
          img.onload = () => {
            const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
            const canvas = document.createElement('canvas');
            canvas.width = Math.max(1, Math.round(img.width * scale));
            canvas.height = Math.max(1, Math.round(img.height * scale));
            const ctx = canvas.getContext('2d', { alpha: false });
            if (!ctx) {
              reject(new Error('Canvas \u4e0d\u53ef\u7528'));
              return;
            }
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            canvas.toBlob(
              (blob) => {
                if (!blob) {
                  reject(new Error('\u751f\u6210\u9884\u89c8\u56fe\u5931\u8d25'));
                  return;
                }
                resolve(blob);
              },
              'image/jpeg',
              0.9
            );
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function renderImagePreview(files) {
      normalizeImageState();
      clearPreviewUrls();
      previewImageBlob = null;
      previewImageBlobMaxDim = null;
      imagePreviewEl.innerHTML = '';
      imagePreviewEl.classList.remove('has-gallery');
      if (!files.length) {
        imagePreviewEl.innerHTML = '<div class="preview-empty">\u9009\u62e9\u56fe\u7247\u540e\u4f1a\u5728\u8fd9\u91cc\u9884\u89c8</div>';
        setOriginalPreview('', false);
        updateImageInfo();
        return;
      }

      const urls = files.map(file => URL.createObjectURL(file));
      imagePreviewUrls = urls;
      galleryCurrentUrls = urls;

      const gallery = document.createElement('div');
      gallery.className = 'gallery-grid';
      imagePreviewEl.classList.add('has-gallery');
      galleryItemNodes = [];
      imagePreviewEl.appendChild(gallery);
      setOriginalPreview(urls[Math.min(activeImageIndex, urls.length - 1)], true);
      updateImageInfo();

      let renderIdx = 0;
      const batchSize = 24;
      const renderBatch = () => {
        const end = Math.min(files.length, renderIdx + batchSize);
        for (; renderIdx < end; renderIdx += 1) {
          const idx = renderIdx;
          const file = files[idx];
          const item = document.createElement('div');
          item.className = `gallery-item${idx === activeImageIndex ? ' is-active' : ''}`;

          const img = document.createElement('img');
          img.loading = idx < 24 ? 'eager' : 'lazy';
          img.decoding = 'async';
          img.src = urls[idx];
          img.alt = file.name || `image-${idx + 1}`;
          item.appendChild(img);

          const checkWrap = document.createElement('label');
          checkWrap.className = 'gallery-check-wrap';
          checkWrap.addEventListener('click', (event) => event.stopPropagation());
          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.className = 'gallery-check';
          checkbox.checked = selectedImageIndexes.has(idx);
          checkbox.addEventListener('click', (event) => event.stopPropagation());
          checkbox.addEventListener('change', () => {
            if (checkbox.checked) {
              selectedImageIndexes.add(idx);
            } else {
              selectedImageIndexes.delete(idx);
            }
            updateImageInfo();
          });
          const checkText = document.createElement('span');
          checkText.textContent = '\u9009\u4e2d';
          checkWrap.appendChild(checkbox);
          checkWrap.appendChild(checkText);
          item.appendChild(checkWrap);

          const indexTag = document.createElement('div');
          indexTag.className = 'gallery-index';
          indexTag.textContent = `${idx + 1}/${files.length}`;
          item.appendChild(indexTag);

          item.addEventListener('click', () => {
            activeImageIndex = idx;
            previewImageBlob = null;
            previewImageBlobMaxDim = null;
            updateGalleryActiveState();
            setOriginalPreview(galleryCurrentUrls[idx], true);
            refreshActivePreview();
          });

          galleryItemNodes.push(item);
          gallery.appendChild(item);
        }

        if (renderIdx < files.length) {
          window.requestAnimationFrame(renderBatch);
        }
      };
      window.requestAnimationFrame(renderBatch);
    }

    function renderLutList() {
      const visibleLuts = getVisibleLuts();
      const sortedLuts = [...visibleLuts].sort((a, b) => {
        if (a.favorite !== b.favorite) {

        }
        return a.label.localeCompare(b.label, 'zh-CN');
      });

      lutListEl.innerHTML = '';
      sortedLuts.forEach(item => {
        const row = document.createElement('div');
        row.className = `lut-row${selectedLutIds.has(item.id) ? ' is-selected' : ''}${activePreviewLutId === item.id ? ' is-active-preview' : ''}`;

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'lut-check';
        checkbox.checked = selectedLutIds.has(item.id);
        checkbox.addEventListener('click', (event) => {
          event.stopPropagation();
        });
        checkbox.addEventListener('change', () => {
          toggleSelectLut(item.id, checkbox.checked);
          row.classList.toggle('is-selected', checkbox.checked);
        });

        const starBtn = document.createElement('button');
        starBtn.type = 'button';
        starBtn.className = `lut-star${item.favorite ? ' is-fav' : ''}`;
        starBtn.textContent = item.favorite ? '*' : 'o';
        starBtn.title = item.favorite ? '\u53d6\u6d88\u6536\u85cf' : '\u6536\u85cf';
        starBtn.addEventListener('click', async (event) => {
          event.stopPropagation();
          try {
            const res = await fetch('/api/favorites/bulk', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ lut_ids: [item.id], favorite: !item.favorite }),
            });
            const data = await res.json();
            if (!res.ok) {
              throw new Error(data.error || '\u6536\u85cf\u72b6\u6001\u66f4\u65b0\u5931\u8d25');
            }
            await loadLuts();
          } catch (e) {
            log(`\u6536\u85cf\u72b6\u6001\u66f4\u65b0\u5931\u8d25\uff1a${e.message}`);
            alert(`\u6536\u85cf\u72b6\u6001\u66f4\u65b0\u5931\u8d25\uff1a${e.message}`);
          }
        });

        const label = document.createElement('div');
        label.className = 'lut-name';
        label.textContent = item.label;

        row.addEventListener('click', () => {
          requestLutPreview(item.id);
        });

        row.appendChild(checkbox);
        row.appendChild(starBtn);
        row.appendChild(label);
        lutListEl.appendChild(row);
      });

      const favCount = allLuts.filter(item => item.favorite).length;
      lutInfoEl.textContent = `\u5f53\u524d LUT \u6570\u91cf\uff1a${allLuts.length}\uff0c\u6536\u85cf\uff1a${favCount}${showFavoritesOnly ? '\uff08\u4ec5\u663e\u793a\u6536\u85cf\uff09' : ''}`;
      favOnlyBtn.textContent = `\u53ea\u770b\u6536\u85cf\uff1a${showFavoritesOnly ? '\u5f00' : '\u5173'}`;
    }

    shadowSaturationEl.addEventListener('change', refreshActivePreview);
    shadowSaturationNumEl.addEventListener('input', () => {
      let v = parseInt(shadowSaturationNumEl.value || '-10', 10);
      if (Number.isNaN(v)) v = -10;
      v = Math.max(-100, Math.min(100, v));
      shadowSaturationNumEl.value = String(v);
      shadowSaturationEl.value = String(v);
    });
    shadowSaturationNumEl.addEventListener('change', refreshActivePreview);
    highlightWarmthEl.addEventListener('input', () => {
      highlightWarmthNumEl.value = highlightWarmthEl.value;
    });
    highlightWarmthEl.addEventListener('change', refreshActivePreview);
    highlightWarmthNumEl.addEventListener('input', () => {
      let v = parseInt(highlightWarmthNumEl.value || '8', 10);
      if (Number.isNaN(v)) v = 8;
      v = Math.max(-100, Math.min(100, v));
      highlightWarmthNumEl.value = String(v);
      highlightWarmthEl.value = String(v);
    });
    highlightWarmthNumEl.addEventListener('change', refreshActivePreview);
    shadowCoolnessEl.addEventListener('input', () => {
      shadowCoolnessNumEl.value = shadowCoolnessEl.value;
    });
    shadowCoolnessEl.addEventListener('change', refreshActivePreview);
    shadowCoolnessNumEl.addEventListener('input', () => {
      let v = parseInt(shadowCoolnessNumEl.value || '6', 10);
      if (Number.isNaN(v)) v = 6;
      v = Math.max(-100, Math.min(100, v));
      shadowCoolnessNumEl.value = String(v);
      shadowCoolnessEl.value = String(v);
    });
    shadowCoolnessNumEl.addEventListener('change', refreshActivePreview);
    sharpenEl.addEventListener('input', () => {
      sharpenNumEl.value = sharpenEl.value;
    });
    sharpenEl.addEventListener('change', refreshActivePreview);
    sharpenNumEl.addEventListener('input', () => {
      let v = parseInt(sharpenNumEl.value || '-10', 10);
      if (Number.isNaN(v)) v = -10;
      v = Math.max(-100, Math.min(100, v));
      sharpenNumEl.value = String(v);
      sharpenEl.value = String(v);
    });
    sharpenNumEl.addEventListener('change', refreshActivePreview);
    clarityEl.addEventListener('input', () => {
      clarityNumEl.value = clarityEl.value;
    });
    clarityEl.addEventListener('change', refreshActivePreview);
    clarityNumEl.addEventListener('input', () => {
      let v = parseInt(clarityNumEl.value || '-8', 10);
      if (Number.isNaN(v)) v = -8;
      v = Math.max(-100, Math.min(100, v));
      clarityNumEl.value = String(v);
      clarityEl.value = String(v);
    });
    clarityNumEl.addEventListener('change', refreshActivePreview);

    refreshBtn.addEventListener('click', loadLuts);

    selectAllBtn.addEventListener('click', () => {
      getVisibleLuts().forEach(item => selectedLutIds.add(item.id));
      renderLutList();
      log(`\u5df2\u5168\u9009\u53ef\u89c1 LUT\uff1a${getVisibleLuts().length}`);
    });

    clearSelBtn.addEventListener('click', () => {
      selectedLutIds.clear();
      renderLutList();
      log('\u5df2\u6e05\u7a7a LUT \u9009\u62e9');
    });

    deleteSelBtn.addEventListener('click', async () => {
      const selectedIds = getSelectedLutIds();
      if (!selectedIds.length) {
        alert('\u8bf7\u5148\u9009\u62e9\u8981\u5220\u9664\u7684 LUT');
        return;
      }
      if (!confirm(`\u786e\u8ba4\u5220\u9664\u9009\u4e2d\u7684 ${selectedIds.length} \u4e2a LUT \u5417\uff1f`)) {
        return;
      }

      try {
        const res = await fetch('/api/luts/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lut_ids: selectedIds }),
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || '\u5220\u9664\u5931\u8d25');
        }
        await loadLuts();
        log(`\u5220\u9664 LUT \u5b8c\u6210\uff1a\u6210\u529f ${data.deleted_count}\uff0c\u8df3\u8fc7 ${data.skipped_invalid.length}`);
      } catch (e) {
        log(`\u5220\u9664 LUT \u5931\u8d25\uff1a${e.message}`);
        alert(`\u5220\u9664 LUT \u5931\u8d25\uff1a${e.message}`);
      }
    });

    pickFavBtn.addEventListener('click', () => {
      selectedLutIds.clear();
      allLuts.filter(item => item.favorite).forEach(item => selectedLutIds.add(item.id));
      renderLutList();
      const favoriteIds = allLuts.filter(item => item.favorite);
      log(`\u5df2\u9009\u62e9\u6536\u85cf LUT\uff1a${favoriteIds.length}`);
    });

    favOnlyBtn.addEventListener('click', () => {
      showFavoritesOnly = !showFavoritesOnly;
      renderLutList();
    });

    importBtn.addEventListener('click', async () => {
      const files = Array.from(lutFilesEl.files || []);
      if (!files.length) {
        alert('\u8bf7\u5148\u9009\u62e9 .cube \u6587\u4ef6');
        return;
      }

      const fd = new FormData();
      files.forEach(f => fd.append('lut_files', f));

      importBtn.disabled = true;
      try {
        const res = await fetch('/api/import-luts', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || '\u5bfc\u5165\u5931\u8d25');
        }
        importInfoEl.textContent = `\u5df2\u5bfc\u5165 ${data.count} \u4e2a LUT`;
        log(`\u5bfc\u5165\u5b8c\u6210\uff1a${data.count} \u4e2a LUT`);
        await loadLuts();
      } catch (e) {
        log(`\u5bfc\u5165\u5931\u8d25\uff1a${e.message}`);
        alert(`\u5bfc\u5165\u5931\u8d25\uff1a${e.message}`);
      } finally {
        importBtn.disabled = false;
      }
    });

    runBtn.addEventListener('click', async () => {
      const images = getCurrentImages();
      const selectedLuts = getSelectedLutIds();

      if (!images.length) {
        alert('\u8bf7\u81f3\u5c11\u4e0a\u4f20 1 \u5f20\u56fe\u7247');
        return;
      }
      if (!selectedLuts.length) {
        alert('\u8bf7\u81f3\u5c11\u9009\u62e9 1 \u4e2a LUT');
        return;
      }

      const grainStrength = parseInt(grainNumEl.value || '38', 10);
      const dispersionStrength = parseInt(dispersionNumEl.value || '8', 10);
      const vignetteStrength = parseInt(vignetteNumEl.value || '18', 10);
      const highlightRolloffStrength = parseInt(highlightRolloffNumEl.value || '35', 10);
      const halationStrength = parseInt(halationNumEl.value || '22', 10);
      const bloomStrength = parseInt(bloomNumEl.value || '18', 10);
      const shadowLiftStrength = parseInt(shadowLiftNumEl.value || '16', 10);
      const toeStrength = parseInt(toeNumEl.value || '28', 10);
      const shoulderStrength = parseInt(shoulderNumEl.value || '42', 10);
      const highlightSaturation = parseInt(highlightSaturationNumEl.value || '-18', 10);
      const shadowSaturation = parseInt(shadowSaturationNumEl.value || '-10', 10);
      const highlightWarmth = parseInt(highlightWarmthNumEl.value || '8', 10);
      const shadowCoolness = parseInt(shadowCoolnessNumEl.value || '6', 10);
      const sharpenStrength = parseInt(sharpenNumEl.value || '-10', 10);
      const clarityStrength = parseInt(clarityNumEl.value || '-8', 10);
      const outputDir = (outputDirEl.value || '').trim();

      const fd = new FormData();
      images.forEach(f => fd.append('images', f));
      fd.append('selected_luts', JSON.stringify(selectedLuts));
      fd.append('grain_strength', String(grainStrength));
      fd.append('dispersion_strength', String(dispersionStrength));
      fd.append('vignette_strength', String(vignetteStrength));
      fd.append('highlight_rolloff_strength', String(highlightRolloffStrength));
      fd.append('halation_strength', String(halationStrength));
      fd.append('bloom_strength', String(bloomStrength));
      fd.append('shadow_lift_strength', String(shadowLiftStrength));
      fd.append('toe_strength', String(toeStrength));
      fd.append('shoulder_strength', String(shoulderStrength));
      fd.append('highlight_saturation', String(highlightSaturation));
      fd.append('shadow_saturation', String(shadowSaturation));
      fd.append('highlight_warmth', String(highlightWarmth));
      fd.append('shadow_coolness', String(shadowCoolness));
      fd.append('sharpen_strength', String(sharpenStrength));
      fd.append('clarity_strength', String(clarityStrength));
      fd.append('output_dir', outputDir);
      fd.append('max_dim', String(parseInt(maxDimEl.value || '1440', 10)));

      setRunning(true);
      setProgress(0, 0, images.length * selectedLuts.length);
      resultEl.textContent = '\u6b63\u5728\u5904\u7406\uff0c\u8bf7\u7a0d\u5019...';
      log(
          `\u5f00\u59cb\u6279\u91cf\u5904\u7406\uff1a\u56fe\u7247 ${images.length} \u5f20 x LUT ${selectedLuts.length} \u4e2a\uff0c\u8f93\u51fa JPG\uff0c\u6700\u957f\u8fb9 ${parseInt(maxDimEl.value || '1440', 10)}px\uff0c\u9897\u7c92 ${grainStrength}\uff0c\u8272\u6563 ${dispersionStrength}\uff0c\u6697\u89d2 ${vignetteStrength}\uff0c\u9ad8\u5149\u6eda\u964d ${highlightRolloffStrength}\uff0chalation ${halationStrength}\uff0cbloom ${bloomStrength}\uff0c\u9634\u5f71\u62ac\u5347 ${shadowLiftStrength}\uff0ctoe ${toeStrength}\uff0cshoulder ${shoulderStrength}\uff0c\u9ad8\u5149\u9971\u548c\u5ea6 ${highlightSaturation}\uff0c\u9634\u5f71\u9971\u548c\u5ea6 ${shadowSaturation}\uff0c\u9ad8\u5149\u6696\u8c03 ${highlightWarmth}\uff0c\u9634\u5f71\u51b7\u8c03 ${shadowCoolness}\uff0c\u9510\u5316 ${sharpenStrength}\uff0c\u6e05\u6670\u5ea6 ${clarityStrength}`
      );

      try {
        const startRes = await fetch('/api/process/start', { method: 'POST', body: fd });
        const startData = await startRes.json();
        if (!startRes.ok) {
          throw new Error(startData.error || '\u542f\u52a8\u5904\u7406\u5931\u8d25');
        }
        const jobId = startData.job_id;
        log(`\u4efb\u52a1\u5df2\u521b\u5efa\uff1a${jobId}`);

        while (true) {
          const statusRes = await fetch(`/api/process/status/${jobId}`);
          const status = await statusRes.json();
          if (!statusRes.ok) {
            throw new Error(status.error || '\u83b7\u53d6\u8fdb\u5ea6\u5931\u8d25');
          }

          setProgress(status.progress, status.done, status.total);

          if (status.status === 'done') {
            const data = status.result || {};
            resultEl.innerHTML = `
              <div>总任务：<b>${data.total}</b></div>
              <div>成功：<b>${data.success}</b>，失败：<b>${data.failed}</b></div>
              <div>导出目录：<b>${data.output_dir}</b></div>
              <div>输出格式：<b>${(data.output_format || 'jpg').toUpperCase()}</b>（高画质）</div>
              <div>最长边：<b>${data.max_dim || parseInt(maxDimEl.value || '1440', 10)}px</b></div>
              <div>颗粒：<b>${data.grain_strength}</b>（ffmpeg noise=${data.ffmpeg_noise_strength}）</div>
              <div>色散：<b>${data.dispersion_strength}</b>（ffmpeg chromashift=${data.ffmpeg_chromashift_px}px）</div>
              <div>暗角：<b>${data.vignette_strength}</b>（ffmpeg vignette angle=${data.ffmpeg_vignette_angle}）</div>
              <div>高光滚降：<b>${data.highlight_rolloff_strength}</b></div>
              <div>Halation：<b>${data.halation_strength}</b>（blend opacity=${data.ffmpeg_halation_opacity}）</div>
              <div>Bloom：<b>${data.bloom_strength}</b>（blend opacity=${data.ffmpeg_bloom_opacity}）</div>
              <div>阴影抬升：<b>${data.shadow_lift_strength}</b></div>
              <div>阴影脚部 Toe：<b>${data.toe_strength}</b></div>
              <div>高光肩部 Shoulder：<b>${data.shoulder_strength}</b></div>
              <div>高光饱和度：<b>${data.highlight_saturation}</b></div>
              <div>阴影饱和度：<b>${data.shadow_saturation}</b></div>
              <div>高光暖调：<b>${data.highlight_warmth}</b></div>
              <div>阴影冷调：<b>${data.shadow_coolness}</b></div>
              <div>锐化：<b>${data.sharpen_strength}</b>（ffmpeg unsharp=${data.ffmpeg_unsharp_amount}）</div>
              <div>清晰度：<b>${data.clarity_strength}</b>（ffmpeg eq contrast=${data.ffmpeg_clarity_contrast}）</div>
            `;
            log(`处理完成：成功 ${data.success}，失败 ${data.failed}`);
            if (data.output_dir) {
              try {
                const openRes = await fetch('/api/open-output', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ path: data.output_dir }),
                });
                const openData = await openRes.json();
                if (!openRes.ok) {
                  log(`自动打开导出目录失败：${openData.error || '未知错误'}`);
                } else {
                  log(`已打开导出目录：${data.output_dir}`);
                }
              } catch (openErr) {
                log(`自动打开导出目录失败：${openErr.message}`);
              }
            }
            if (data.log_tail && data.log_tail.length) {
              data.log_tail.forEach(item => log(item));
            }
            break;
          }

          if (status.status === 'error') {
            throw new Error(status.error || '处理失败');
          }

          await new Promise(resolve => setTimeout(resolve, 400));
        }
      } catch (e) {
        resultEl.textContent = `处理失败：${e.message}`;
        log(`处理失败：${e.message}`);
        alert(`处理失败：${e.message}`);
      } finally {
        setRunning(false);
      }
    });

    updateImageInfo();
    initPreviewLutResize();
    loadLuts().catch(err => {
      log(`初始化 LUT 列表失败：${err.message}`);
    });
  </script>
</body>
</html>
